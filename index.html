<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Hub & Video Review - v26.1</title>
  <style>
    /* --- Base Layout & Theme --- */
    :root {
      --bg-dark: #121212;
      --panel-bg: #1e1e1e;
      --text-main: #e0e0e0;
      --accent-red: #ff4d4d;
      --btn-base-opacity: 0.85; /* Lowered by 15% from 1.0 */
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
      height: 100vh;
    }

    /* --- PERSISTENT SIGN-OUT BUTTON (Extreme Left) --- */
    .sign-out-anchor {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 9999;
      
      /* Visual styling matching requirements */
      background-color: rgba(0, 0, 0, 0.15); /* 15% opacity black */
      color: var(--accent-red);
      border: 1px solid rgba(255, 77, 77, 0.2);
      border-left: none; /* Flush with edge */
      border-radius: 0 8px 8px 0;
      
      padding: 12px 14px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      writing-mode: vertical-lr; /* Optional: vertical orientation for a sleek profile */
      transform-origin: left center;
      transition: background-color 0.2s ease, padding-left 0.2s ease;
    }

    .sign-out-anchor:hover {
      background-color: rgba(0, 0, 0, 0.4);
      padding-left: 18px; /* Slight offset peek on hover */
    }

    /* --- VIDEO REVIEW PAGE LAYOUT --- */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 0 40px 0 80px; /* Offset left padding to clear the sign-out anchor */
      box-sizing: border-box;
    }

    .video-viewport {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #2d2d2d;
      position: relative;
      overflow: hidden;
    }

    .video-placeholder-text {
      color: #666;
      font-size: 1.1rem;
    }

    /* --- ACTION CONTROLS (v26.1 Lowered Opacity) --- */
    .control-panel {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .control-btn {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #3d3d3d;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      
      /* Version 26.1 Opacity reduction (Lowered by 15%) */
      opacity: var(--btn-base-opacity); 
      transition: opacity 0.2s ease, background-color 0.2s ease;
    }

    .control-btn:hover {
      opacity: 1; /* Bring back to full focus visibility on hover */
      background: #333;
    }

    .control-btn.primary {
      background: #0070f3;
      border-color: #0080ff;
    }
    
    .control-btn.primary:hover {
      background: #0060df;
    }

    /* --- OVERLAY SCREENS (Password/Lock) --- */
    .screen-overlay {
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .screen-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .lock-box {
      background: var(--panel-bg);
      padding: 40px;
      border-radius: 16px;
      border: 1px solid #2d2d2d;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .lock-box input {
      background: #121212;
      border: 1px solid #3d3d3d;
      padding: 12px;
      color: #fff;
      border-radius: 6px;
      width: 220px;
      margin-bottom: 16px;
      text-align: center;
      outline: none;
    }

    .lock-box button {
      background: #fff;
      color: #000;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }

    .version-tag {
      position: fixed;
      bottom: 16px;
      right: 16px;
      color: #444;
      font-size: 0.75rem;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <!-- 1. Left Edge Sign Out Anchor -->
  <button class="sign-out-anchor" onclick="triggerSignOut()">
    Sign Out
  </button>

  <!-- Main Video Review Area -->
  <div class="container">
    <div class="video-viewport">
      <div class="video-placeholder-text">Video Review Stream Feed</div>
    </div>

    <!-- 2. Controls Panel (Resting opacity at 85%) -->
    <div class="control-panel">
      <button class="control-btn primary">Start Session</button>
      <button class="control-btn">Clear Canvas</button>
      <button class="control-btn">Toggle Overlay</button>
      <button class="control-btn">Mark Keyframe</button>
    </div>
  </div>

  <!-- 3. Password / Authentication Screen Overlay (Triggers on Sign-Out) -->
  <div id="passwordOverlay" class="screen-overlay">
    <div class="lock-box">
      <h2 style="margin-top: 0; margin-bottom: 24px;">Session Locked</h2>
      <input type="password" id="passInput" placeholder="Enter password to sign back in">
      <br>
      <button onclick="mockSignIn()">Sign In</button>
    </div>
  </div>

  <div class="version-tag">v26.1</div>

  <script>
    // --- SIGN OUT & PASSWORD STATE HANDLERS ---
    const overlay = document.getElementById('passwordOverlay');
    const passInput = document.getElementById('passInput');

    function triggerSignOut() {
      // Clear password field and activate password block
      passInput.value = '';
      overlay.classList.add('active');
    }

    function mockSignIn() {
      // Return to workspace view on mock password entry
      if (passInput.value.trim() !== '') {
        overlay.classList.remove('active');
      } else {
        alert('Please enter a password');
      }
    }

    // Allow Enter key to sign in
    passInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') mockSignIn();
    });

    // --- 4. GAZE AND VISIBILITY SECURITY BYPASS (v26.1) ---
    function onUserGazeChanged(isLooking) {
      if (!isLooking) {
        // SECURITY NOTICE BYPASS
        // Log activity silently. No prompt trigger or auto-lockout is executed.
        console.log("v26.1 Update: User checked away from screen. Gaze trigger bypassed.");
        return;
      }
    }

    // Fallback Page Visibility API Bypass
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        // Silently preserve state, do not interrupt workspace or pop warning screens.
        console.log("v26.1 Update: Tab hidden. Auto-lock bypass active.");
      }
    });
  </script>
</body>
</html>
