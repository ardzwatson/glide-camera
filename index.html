    // Fixed slider interactions using synchronized layout-stable changes
    let scrubRefSeekTimer = null;
    scrubSlider.addEventListener('input', () => {
      if (!isReviewMode) return;
      isUserScrubbing = true;
      isSeeking = true;
      const targetTime = parseFloat(scrubSlider.value);
      updateTimeDisplayLabel(targetTime);

      // reviewPlayer is a local blob - cheap to seek on every tick for responsive feedback.
      reviewPlayer.currentTime = targetTime;

      // refVideo is HLS - seeking on every drag tick causes a seek storm that stalls/glitches
      // while buffering. Throttle it so it only actually seeks a few times per second.
      if (scrubRefSeekTimer) clearTimeout(scrubRefSeekTimer);
      scrubRefSeekTimer = setTimeout(() => {
        refVideo.currentTime = getTargetRefTime(targetTime);
      }, 120);
    });

    scrubSlider.addEventListener('change', () => {
      if (!isReviewMode) return;
      const targetTime = parseFloat(scrubSlider.value);

      if (scrubRefSeekTimer) { clearTimeout(scrubRefSeekTimer); scrubRefSeekTimer = null; }

      let pendingSeeks = 2;
      const checkSeekDone = () => {
        pendingSeeks--;
        if (pendingSeeks === 0) {
          isSeeking = false;
          isUserScrubbing = false;
          if (isReviewPlaying) {
            if (webAudioContext && webAudioContext.state === 'suspended' && !muteReviewBtn.classList.contains('is-muted')) {
              webAudioContext.resume();
            }
            refVideo.play().then(() => reviewPlayer.play().catch(() => {})).catch(() => {});
          }
        }
      };

      const targetRefTime = getTargetRefTime(targetTime);
      reviewPlayer.fastSeek ? reviewPlayer.fastSeek(targetTime) : (reviewPlayer.currentTime = targetTime);
      refVideo.fastSeek ? refVideo.fastSeek(targetRefTime) : (refVideo.currentTime = targetRefTime);

      setTimeout(checkSeekDone, 40);
      setTimeout(checkSeekDone, 40);
    });

    resetBtn.addEventListener('click', () => {
      if (!isReviewMode) return;
      
      if (!resetBtn.classList.contains('danger-active')) {
        resetBtn.classList.add('danger-active');
        resetBtn.innerText = "Are you sure?";
        setTimeout(() => {
          if (isReviewMode && resetBtn.classList.contains('danger-active')) {
            resetBtn.classList.remove('danger-active');
            resetBtn.innerText = "Reset / Clear";
          }
        }, 4000);
      } else {
        performFullSystemReset();
      }
    });

    function performFullSystemReset() {
      pauseBoth();
      cleanupIsolatedAudioPipeline();
      removeVideoEndedListener();
      
      isReviewMode = false;
      isReviewPlaying = false;
      isSeeking = false;
      isPreviewingRef = false;
      recordedChunks = [];
      currentVideoBlob = null;
      pendingSaveBlob = null;
      pendingSaveFilename = null;
      loopStartTime = 0;
      loopEndTime = 0;
      isConverting = false;
      if (reviewPlaybackUrl) { URL.revokeObjectURL(reviewPlaybackUrl); reviewPlaybackUrl = null; }

      // Unload playback track safely
      reviewPlayer.pause();
      reviewPlayer.removeAttribute('src'); 
      reviewPlayer.load();

      // Instantly switch display back to live viewfinder
      reviewPlayer.classList.remove('active-view');
      viewfinder.classList.add('active-view');
      reviewPlayer.style.transform = 'scale(1)';

      masterTimeline.classList.remove('show'); refTimeline.classList.remove('show');
      syncOffsetRow.classList.remove('show');
      resetSyncOffset();
      downloadBtn.style.display = "none";
      downloadBtn.disabled = false;
      downloadBtn.innerText = "Save";
      downloadBtn.classList.remove('save-pending', 'save-error');
      zoomUi.style.display = "flex";
      resetBtn.style.display = "none";
      resetBtn.disabled = true;
      resetBtn.classList.remove('danger-active');
      resetBtn.innerText = "Reset / Clear";
      
      previewRefBtn.disabled = false;
      previewRefBtn.innerText = "Preview Ref";
      previewRefBtn.className = "custom-png-btn";

      streamLabel.classList.remove('review-active');
      streamLabel.innerHTML = `<span>YOU (LIVE CAM)</span><span class="zoom-note" id="zoomNote">Zoom applies to preview window only</span>`;
      
      actionBtn.innerText = "Start Session";
      actionBtn.className = "custom-png-btn";
      
      overlayToggleBtn.classList.remove('hidden');
      if (overlayActive) { cameraOverlay.classList.remove('hidden'); opacitySelector.classList.remove('hidden'); }
      else { opacitySelector.classList.add('hidden'); }

      setupInitialState();
    }

    function generateSaveFilename(ext) {
      const displayName = (authorizedUser || 'User')
        .trim()
        .split(/\s+/)
        .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
        .join('_')
        .replace(/[^\w\-]/g, '');
      const now = new Date();
      const date = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
      const time = `${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}`;
      return `${displayName}_Performance_Review_${date}_${time}.${ext || 'mp4'}`;
    }

    function withTimeout(promise, ms, message) {
      let timer;
      const timeout = new Promise((_, reject) => {
        timer = setTimeout(() => reject(new Error(message || 'Operation timed out')), ms);
      });
      return Promise.race([promise, timeout]).finally(() => clearTimeout(timer));
    }

    async function loadFFmpeg() {
      if (ffmpegInstance) return ffmpegInstance;
      if (ffmpegLoadPromise) return ffmpegLoadPromise;

      ffmpegLoadPromise = (async () => {
        if (!window.FFmpegWASM || !window.FFmpegUtil) {
          throw new Error('Video converter failed to load. Check your connection and refresh.');
        }
        const { FFmpeg } = FFmpegWASM;
        const { toBlobURL } = FFmpegUtil;
        const ffmpeg = new FFmpeg();
        const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd';
        await withTimeout(
          ffmpeg.load({
            coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
            wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
          }),
          FFMPEG_LOAD_TIMEOUT_MS,
          'Video converter took too long to load. Your connection may be too slow for on-device conversion.'
        );
        ffmpegInstance = ffmpeg;
        return ffmpeg;
      })();

      try {
        return await ffmpegLoadPromise;
      } catch (err) {
        ffmpegLoadPromise = null;
        throw err;
      }
    }

    function setConversionProgress(pct) {
      if (pct >= 100) {
        downloadBtn.innerText = 'Finishing...';
      } else if (pct > 0) {
        downloadBtn.innerText = `${pct}%`;
      } else {
        downloadBtn.innerText = 'Converting...';
      }
    }

    function detachFFmpegProgress(ffmpeg) {
      if (ffmpegProgressHandler) {
        ffmpeg.off('progress', ffmpegProgressHandler);
        ffmpegProgressHandler = null;
      }
    }

    async function convertRecordingToMP4(blob) {
      if (!ffmpegInstance) downloadBtn.innerText = 'Loading...';
      const ffmpeg = await loadFFmpeg();
      const inputExt = blob.type.includes('webm') ? 'webm' : 'mp4';
      const inputName = `recording_input.${inputExt}`;
      const outputName = 'recording_output.mp4';

      detachFFmpegProgress(ffmpeg);
      let hasProgress = false;
      ffmpegProgressHandler = ({ progress }) => {
        hasProgress = true;
        setConversionProgress(Math.round(Math.min(1, Math.max(0, progress)) * 100));
      };
      ffmpeg.on('progress', ffmpegProgressHandler);

      setConversionProgress(0);
      await ffmpeg.writeFile(inputName, new Uint8Array(await blob.arrayBuffer()));

      await withTimeout(
        ffmpeg.exec([
          '-i', inputName,
          '-c:v', 'libx264', '-preset', 'veryfast', '-crf', '25',
          '-c:a', 'aac', '-b:a', '128k',
          '-movflags', '+faststart',
          outputName
        ]),
        FFMPEG_CONVERT_TIMEOUT_MS,
        'Conversion took too long on this device.'
      );

      setConversionProgress(100);
      const data = await ffmpeg.readFile(outputName);
      await ffmpeg.deleteFile(inputName);
      await ffmpeg.deleteFile(outputName);
      detachFFmpegProgress(ffmpeg);

      if (!hasProgress) setConversionProgress(100);
      return new Blob([data], { type: 'video/mp4' });
    }

    function isMp4Blob(blob) {
      return !!(blob && blob.type && blob.type.includes('mp4'));
    }

    // Returns a blob that is guaranteed to be MP4. Recordings that are already MP4
    // (common on iOS Safari, which can record MediaRecorder output directly as MP4)
    // skip the heavy ffmpeg.wasm transcode entirely - that's the main source of
    // "stalling" on phones, since loading a ~25MB wasm core plus running a real-time
    // encode is slow and memory-hungry on mobile.
    async function getExportableMp4Blob(sourceBlob) {
      if (isMp4Blob(sourceBlob)) return sourceBlob;
      return await convertRecordingToMP4(sourceBlob);
    }

    // Tries, in order: native share sheet (best on mobile - lets the user save
    // straight to Photos), the File System Access API (desktop Chrome/Edge), then a
    // plain anchor-download fallback for everything else.
    async function shareOrSaveBlob(blob, filename) {
      try {
        const file = new File([blob], filename, { type: blob.type || 'video/mp4' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: filename });
          return 'shared';
        }
      } catch (err) {
        if (err && err.name === 'AbortError') return 'cancelled';
        console.warn('Share failed, falling back to direct save:', err);
      }

      if (window.showSaveFilePicker) {
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: filename,
            types: [{ description: 'MP4 Videos', accept: { 'video/mp4': ['.mp4'] } }]
          });
          const writable = await handle.createWritable();
          await writable.write(blob);
          await writable.close();
          return 'saved';
        } catch (err) {
          if (err && err.name === 'AbortError') return 'cancelled';
          console.warn('showSaveFilePicker failed, falling back to anchor download:', err);
        }
      }

      const downloadUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.style.display = 'none';
      a.href = downloadUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(downloadUrl);
      }, 60000);
      return 'downloaded';
    }

    function resetDownloadButtonIdle() {
      downloadBtn.innerText = 'Save';
      downloadBtn.classList.remove('save-pending', 'save-error');
    }

    downloadBtn.addEventListener('click', async () => {
      if (isConverting) return;

      // Phase 2: a save is already staged - this tap is a *fresh* user gesture,
      // which mobile browsers require in order to actually trigger a share/download.
      if (pendingSaveBlob) {
        const blob = pendingSaveBlob;
        const filename = pendingSaveFilename;
        downloadBtn.disabled = true;
        try {
          const result = await shareOrSaveBlob(blob, filename);
          if (result === 'cancelled') {
            downloadBtn.innerText = 'Tap to Save';
          } else {
            pendingSaveBlob = null;
            pendingSaveFilename = null;
            downloadBtn.classList.remove('save-pending', 'save-error');
            downloadBtn.innerText = 'Saved!';
            setTimeout(resetDownloadButtonIdle, 2000);
          }
        } catch (err) {
          console.error('Save failed:', err);
          downloadBtn.classList.add('save-error');
          downloadBtn.innerText = 'Tap to Retry';
        } finally {
          downloadBtn.disabled = false;
        }
        return;
      }

      // Phase 1: prepare an MP4 blob (instant if already MP4, otherwise a real convert).
      if (!currentVideoBlob) return;
      isConverting = true;
      downloadBtn.disabled = true;
      downloadBtn.classList.remove('save-error');
      setConversionProgress(0);

      const alreadyMp4 = isMp4Blob(currentVideoBlob);

      try {
        const mp4Blob = await getExportableMp4Blob(currentVideoBlob);
        const filename = generateSaveFilename('mp4');

        if (alreadyMp4) {
          // No async conversion happened, so we're still effectively inside the
          // original tap - safe to save/share immediately.
          const result = await shareOrSaveBlob(mp4Blob, filename);
          if (result === 'cancelled') {
            pendingSaveBlob = mp4Blob;
            pendingSaveFilename = filename;
            downloadBtn.classList.add('save-pending');
            downloadBtn.innerText = 'Tap to Save';
          } else {
            downloadBtn.innerText = 'Saved!';
            setTimeout(resetDownloadButtonIdle, 2000);
          }
        } else {
          // Real conversion took real time - the original gesture has expired on
          // most mobile browsers, so surface a fresh button instead of silently failing.
          pendingSaveBlob = mp4Blob;
          pendingSaveFilename = filename;
          downloadBtn.classList.add('save-pending');
          downloadBtn.innerText = 'Tap to Save';
        }
      } catch (err) {
        console.error('Conversion failed:', err);
        const fallbackToOriginal = confirm(
          `MP4 conversion failed on this device (${err.message || err}).\n\nSave the original recording instead? It may not play everywhere but will still open on this device.`
        );
        if (fallbackToOriginal) {
          const ext = currentVideoBlob.type.includes('webm') ? 'webm' : 'mp4';
          pendingSaveBlob = currentVideoBlob;
          pendingSaveFilename = generateSaveFilename(ext);
          downloadBtn.classList.add('save-pending');
          downloadBtn.innerText = 'Tap to Save';
        } else {
          resetDownloadButtonIdle();
        }
      } finally {
        isConverting = false;
        downloadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
