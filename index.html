<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    video { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>
  <!-- The live feed video element -->
  <video id="viewfinder" autoplay playsinline muted></video>

  <script>
    async function startCamera() {
      try {
        // Request the back camera specifically for mobile phones
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
        const videoElement = document.getElementById('viewfinder');
        videoElement.srcObject = stream;
      } catch (err) {
        console.error("Camera access denied or unsupported:", err);
      }
    }
    // Start automatically when the iframe loads
    window.addEventListener('DOMContentLoaded', startCamera);
  </script>
</body>
</html>
